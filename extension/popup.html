<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Exporter</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --border: #0f3460;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --text: #eee;
      --text-muted: #888;
      --success: #4ecca3;
      --warn: #f0a500;
      --error: #e94560;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ─── Status Bar ─────────────────────────────────── */
    .status-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      padding: 6px 8px;
      background: var(--surface);
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 11px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.green { background: var(--success); }
    .dot.red { background: var(--error); }
    .dot.yellow { background: var(--warn); }

    /* ─── Sections ───────────────────────────────────── */
    .section {
      margin-bottom: 12px;
    }

    .section-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    /* ─── Space Filter ───────────────────────────────── */
    .space-filter {
      width: 100%;
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      border-bottom: none;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }
    .space-filter:focus {
      border-color: var(--accent);
    }
    .space-filter::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    /* ─── Space List ─────────────────────────────────── */
    .space-list {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 0 0 6px 6px;
      background: var(--surface);
    }

    .space-list:empty::after {
      content: "No spaces loaded. Click 'Load Spaces' below.";
      display: block;
      padding: 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    .space-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .space-item:last-child { border-bottom: none; }
    .space-item:hover { background: rgba(233, 69, 96, 0.08); }

    .space-item input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .space-name-col {
      flex: 1;
      overflow: hidden;
      min-width: 0;
    }

    .space-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .space-id {
      font-size: 10px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.7;
    }

    .space-type {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--border);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ─── Controls ────────────────────────────────────── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .controls.full { grid-template-columns: 1fr; }

    label {
      font-size: 11px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 3px;
    }

    input[type="text"].text-input,
    input[type="date"],
    select {
      width: 100%;
      padding: 5px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
    }

    input[type="text"].text-input:focus,
    input[type="date"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ─── Buttons ─────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 7px 12px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover:not(:disabled) { background: #1a4a80; }

    /* ─── Progress ────────────────────────────────────── */
    .progress-area {
      display: none;
      margin-top: 10px;
      padding: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .progress-area.active { display: block; }

    .progress-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin: 6px 0;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ─── Scrollbar ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #1a4a80; }
  </style>
</head>
<body>
  <h1>Chat Exporter</h1>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item">
      <span id="dot-ws" class="dot red"></span>
      <span id="label-ws">Server</span>
    </div>
    <div class="status-item">
      <span id="dot-xsrf" class="dot red"></span>
      <span id="label-xsrf">Auth</span>
    </div>
    <div class="status-item" style="margin-left: auto;">
      <button id="btn-reconnect" class="btn-secondary" style="flex:none; padding: 2px 8px; font-size: 10px;">Reconnect</button>
    </div>
  </div>

  <!-- Spaces Section -->
  <div class="section">
    <div class="section-header">Spaces</div>
    <input type="text" id="space-filter" class="space-filter" placeholder="Filter spaces and DMs...">
    <div id="space-list" class="space-list"></div>
    <div class="btn-row">
      <button id="btn-load-spaces" class="btn-secondary">Refresh Spaces</button>
      <button id="btn-select-all" class="btn-secondary" disabled>Select All</button>
    </div>
  </div>

  <!-- Export Options -->
  <div class="section">
    <div class="section-header">Export Options</div>
    <div class="controls">
      <div>
        <label for="since">Since</label>
        <input type="date" id="since">
      </div>
      <div>
        <label for="until">Until</label>
        <input type="date" id="until">
      </div>
    </div>
    <div class="controls" style="margin-top: 8px;">
      <div>
        <label for="format">Format</label>
        <select id="format">
          <option value="jsonl" selected>JSONL (streaming)</option>
          <option value="json">JSON (single file)</option>
          <option value="json-batched">JSON batched</option>
        </select>
      </div>
      <div style="display: flex; align-items: flex-end;">
        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; padding-bottom: 5px;">
          <input type="checkbox" id="raw"> Include raw PBLite
        </label>
      </div>
    </div>
    <div class="controls full" style="margin-top: 8px;">
      <div>
        <label for="output-dir">Output Directory</label>
        <input type="text" id="output-dir" class="text-input" placeholder="~/chat-exports">
      </div>
    </div>
  </div>

  <!-- Export Button -->
  <div class="btn-row">
    <button id="btn-export" class="btn-primary" disabled>Export Selected</button>
  </div>

  <!-- Progress Area -->
  <div id="progress-area" class="progress-area">
    <div class="progress-text" id="progress-text">Exporting...</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
  </div>

  <script src="scripts/popup.js"></script>
</body>
</html>
